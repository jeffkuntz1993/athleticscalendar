<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santa Fe Chiefs Athletics</title>
    
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    
    <style>
        :root {
            --chiefs-red: #a51515;
            --chiefs-black: #000000;
            --chiefs-gray: #f4f4f4;
        }

        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; 
            background-color: var(--chiefs-gray); 
        }

        .header-bar {
            background-color: var(--chiefs-red);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 5px solid var(--chiefs-black);
            margin-bottom: 20px;
        }

        .container { 
            max-width: 1200px; 
            margin: auto; 
            background: white; 
            padding: 30px; 
            border-radius: 4px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        /* Filter Section */
        #filters { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            justify-content: center; 
            margin-bottom: 25px; 
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .filter-item { 
            display: flex; 
            align-items: center; 
            background: var(--chiefs-black); 
            color: white;
            padding: 8px 15px; 
            border-radius: 4px; 
            font-size: 0.85em; 
            cursor: pointer; 
            font-weight: bold;
            text-transform: uppercase;
        }

        .filter-item input { margin-right: 10px; accent-color: var(--chiefs-red); }

        /* Controls & Season Jumps */
        .controls { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 15px; 
            align-items: center; 
            flex-wrap: wrap;
            gap: 10px;
        }

        .season-jumps { display: flex; gap: 5px; }

        .jump-btn { 
            background-color: var(--chiefs-black); 
            color: white; 
            border: 2px solid var(--chiefs-red);
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            font-size: 0.8em;
        }

        .jump-btn:hover { background-color: var(--chiefs-red); }

        .print-btn { 
            background-color: var(--chiefs-red); 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Calendar Styling */
        .fc-header-toolbar { text-transform: uppercase; font-weight: bold; }
        .fc-button-primary { 
            background-color: var(--chiefs-red) !important; 
            border-color: var(--chiefs-red) !important; 
        }
        .fc-button-primary:hover { 
            background-color: var(--chiefs-black) !important; 
            border-color: var(--chiefs-black) !important; 
        }

        /* Subscription Sections */
        .season-group { margin-top: 30px; border: 1px solid #ddd; border-radius: 8px; padding: 15px; background: white; }
        .season-header { 
            background: var(--chiefs-black); color: white; padding: 10px; 
            margin: -15px -15px 15px -15px; border-radius: 8px 8px 0 0; 
            text-transform: uppercase; font-size: 0.9em; letter-spacing: 1px; font-weight: bold;
        }
        .subscribe-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .sub-link { 
            background: white; color: var(--chiefs-black); border: 1px solid var(--chiefs-black); 
            padding: 8px 12px; text-decoration: none; border-radius: 4px; font-size: 0.8em; font-weight: bold; 
        }
        .sub-link:hover { background: var(--chiefs-red); color: white; border-color: var(--chiefs-red); }

        @media print {
            #filters, .controls, .header-bar, .season-group, h2 { display: none; }
            .container { box-shadow: none; width: 100%; max-width: 100%; padding: 0; }
        }
    </style>
</head>
<body>

<div class="header-bar">
    <h1 style="margin:0;">SANTA FE CHIEFS ATHLETICS</h1>
    <p id="academic-year-label" style="margin:5px 0 0 0; opacity: 0.9;">Official Sports Schedules</p>
</div>

<div class="container">
    <div id="filters"></div>

    <div class="controls">
        <div class="season-jumps">
            <button class="jump-btn" onclick="handleSeasonClick('fall')">FALL VIEW</button>
            <button class="jump-btn" onclick="handleSeasonClick('winter')">WINTER VIEW</button>
            <button class="jump-btn" onclick="handleSeasonClick('spring')">SPRING VIEW</button>
        </div>
        <button class="print-btn" onclick="window.print()">PRINT SCHEDULE</button>
    </div>

    <div id="calendar"></div>

    <h2 style="text-align: center; margin-top: 50px; color: var(--chiefs-red); text-transform: uppercase;">Subscribe to Chiefs Calendars</h2>

    <div class="season-group">
        <div class="season-header">Fall Sports</div>
        <div class="subscribe-grid">
            <a href="https://calendar.google.com/calendar/ical/c_dfd1423d90a198b1e3f5f377967bef73038e8c5f1534f4943597bbfc71891820%40group.calendar.google.com/public/basic.ics" class="sub-link">JH Volleyball</a>
			<a href="https://calendar.google.com/calendar/ical/c_17393a4bae575b317427f647a5acd290f896e39f839738f9bbbeb7cdf823042d%40group.calendar.google.com/public/basic.ics" class="sub-link">HS Volleyball</a>
			<a href="https://calendar.google.com/calendar/ical/c_155213f7e0e9940139462e47a38f7e8c04cd66b468705371cadd2a0f0ab09af1%40group.calendar.google.com/public/basic.ics" class="sub-link">JH Football</a>
			<a href="https://calendar.google.com/calendar/ical/c_a9f2cc812095ce46283060150449807196be7885a9a719160a85eaad1f993702%40group.calendar.google.com/public/basic.ics" class="sub-link">HS Football</a>
        </div>
    </div>

    <div class="season-group">
        <div class="season-header">Winter Sports</div>
        <div class="subscribe-grid">
            <a href="https://calendar.google.com/calendar/ical/c_e4dff517af6abef3374877d175be9266380d3c48c0d3f696c1650827cfd5c031%40group.calendar.google.com/public/basic.ics" class="sub-link">JH Basketball</a>
			<a href="https://calendar.google.com/calendar/ical/c_1ad0c08db8124f1e067b5617ec59c186162b22df2743bbbce23a209b0bf0a33f%40group.calendar.google.com/public/basic.ics" class="sub-link">HS Basketball</a>
        </div>
    </div>

    <div class="season-group">
        <div class="season-header">Spring Sports</div>
        <div class="subscribe-grid">
            <a href="https://calendar.google.com/calendar/ical/c_074082d15e1f187af7ea4f5406b2de705f4e093f4140c42b1cefd943a078372e%40group.calendar.google.com/public/basic.ics" class="sub-link">JH Track</a>
			<a href="https://calendar.google.com/calendar/ical/c_d41374caf89f49d4996556e06ed3bbab8e26b0f8023ddb087db72e2e21e44c83%40group.calendar.google.com/public/basic.ics" class="sub-link">HS Track</a>
			<a href="https://calendar.google.com/calendar/ical/c_fdf2841868ea953406689e1669ec05a1540e59587fcc50ebc6043a369cb80c8f%40group.calendar.google.com/public/basic.ics" class="sub-link">Softball</a>
			<a href="https://calendar.google.com/calendar/ical/c_4ad32231ccccd00275d828d0691134eca12073e5df5d45c36102dea616afffdc%40group.calendar.google.com/public/basic.ics" class="sub-link">Baseball</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
    // --- CONFIGURATION ---
    const PROXY_URL = 'https://script.google.com/macros/s/AKfycbyn0TioU0zScUNKcx4ru5ugmReV_LW4SESWYGkDcxdUh7hoFIzWb7jLm9wlRc8tIjx97A/exec';

    const sports = [
        { id: 'jh_vb', name: 'JH Volleyball', color: '#a51515' },
        { id: 'hs_vb', name: 'HS Volleyball', color: '#000000' },
        { id: 'jh_fb', name: 'JH Football', color: '#a51515' },
        { id: 'hs_fb', name: 'HS Football', color: '#000000' },
        { id: 'jh_bk', name: 'JH Basketball', color: '#a51515' },
        { id: 'hs_bk', name: 'HS Basketball', color: '#000000' },
        { id: 'jh_tr', name: 'JH Track', color: '#a51515' },
        { id: 'hs_tr', name: 'HS Track', color: '#000000' },
        { id: 'sb', name: 'Softball', color: '#a51515' },
        { id: 'bb', name: 'Baseball', color: '#000000' }
    ];

    let calendar;

    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        const filterEl = document.getElementById('filters');

        // Set Dynamic Academic Year Label
        const now = new Date();
        const displayYear = (now.getMonth() >= 6) 
            ? `${now.getFullYear()}-${now.getFullYear() + 1}` 
            : `${now.getFullYear() - 1}-${now.getFullYear()}`;
        document.getElementById('academic-year-label').innerText = `Official Schedules for ${displayYear}`;

        // Initialize Calendar
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,multiMonthYear,listMonth'
            },
            views: {
                multiMonthYear: {
                    buttonText: 'Season View',
                    duration: { months: 12 }
                }
            }
        });

        // Create Checkboxes and Load Data
        sports.forEach(sport => {
            const div = document.createElement('div');
            div.className = 'filter-item';
            div.innerHTML = `<input type="checkbox" id="${sport.id}" checked> <label for="${sport.id}">${sport.name}</label>`;
            filterEl.appendChild(div);

            const sourceUrl = `${PROXY_URL}?sport=${encodeURIComponent(sport.name)}`;

            calendar.addEventSource({
                id: sport.id,
                url: sourceUrl,
                backgroundColor: sport.color,
                borderColor: sport.color
            });

            div.querySelector('input').addEventListener('change', function() {
                if (this.checked) {
                    calendar.addEventSource({ id: sport.id, url: sourceUrl, backgroundColor: sport.color, borderColor: sport.color });
                } else {
                    const source = calendar.getEventSourceById(sport.id);
                    if (source) source.remove();
                }
            });
        });

        calendar.render();
    });

    // Seasonal Jump Logic
    function handleSeasonClick(season) {
        const now = new Date();
        const currentMonth = now.getMonth();
        const currentYear = now.getFullYear();
        let targetDate;

        if (season === 'fall') {
            const targetYear = (currentMonth >= 6) ? currentYear : currentYear - 1;
            targetDate = `${targetYear}-08-01`;
        } else if (season === 'winter') {
            const targetYear = (currentMonth >= 6) ? currentYear : currentYear - 1;
            targetDate = `${targetYear}-11-01`;
        } else if (season === 'spring') {
            const targetYear = (currentMonth >= 6) ? currentYear + 1 : currentYear;
            targetDate = `${targetYear}-03-01`;
        }

        calendar.changeView('multiMonthYear');
        calendar.gotoDate(targetDate);
    }
</script>

</body>
</html>
