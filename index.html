<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santa Fe Chiefs Athletics</title>
    
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <style>
        :root {
            --chiefs-red: #a51515;
            --chiefs-black: #000000;
            --chiefs-gray: #f4f4f4;
        }

        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; 
            background-color: var(--chiefs-gray); 
        }

        /* Header Bar to match school site */
        .header-bar {
            background-color: var(--chiefs-red);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 5px solid var(--chiefs-black);
            margin-bottom: 20px;
        }

        .container { 
            max-width: 1200px; 
            margin: auto; 
            background: white; 
            padding: 30px; 
            border-radius: 4px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        /* Chiefs Themed Filters */
        #filters { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            justify-content: center; 
            margin-bottom: 25px; 
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .filter-item { 
            display: flex; 
            align-items: center; 
            background: var(--chiefs-black); 
            color: white;
            padding: 8px 15px; 
            border-radius: 4px; 
            font-size: 0.85em; 
            cursor: pointer; 
            font-weight: bold;
            text-transform: uppercase;
        }

        .filter-item input { margin-right: 10px; accent-color: var(--chiefs-red); }

        /* Buttons */
        .controls { display: flex; justify-content: flex-end; margin-bottom: 15px; }
        .print-btn { 
            background-color: var(--chiefs-black); 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .print-btn:hover { background-color: var(--chiefs-red); }

        /* Calendar customization */
        .fc-header-toolbar { text-transform: uppercase; font-weight: bold; }
        .fc-button-primary { 
            background-color: var(--chiefs-red) !important; 
            border-color: var(--chiefs-red) !important; 
        }
        .fc-button-primary:hover { 
            background-color: var(--chiefs-black) !important; 
            border-color: var(--chiefs-black) !important; 
        }
        .fc-daygrid-event { border-radius: 3px; border: none !important; }

        @media print {
            #filters, .controls, .header-bar { display: none; }
            .container { box-shadow: none; width: 100%; max-width: 100%; padding: 0; }
        }
    </style>
</head>
<body>

<div class="header-bar">
    <h1 style="margin:0;">SANTA FE CHIEFS ATHLETICS</h1>
    <p style="margin:5px 0 0 0; opacity: 0.9;">Official Sports Schedules</p>
</div>

<div class="container">
    <div id="filters">
        </div>

    <div class="controls">
        <button class="print-btn" onclick="window.print()">PRINT SCHEDULE</button>
    </div>

    <div id="calendar"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
    // 1. UPDATE THIS WITH YOUR DEPLOYED WEB APP URL
    const PROXY_URL = 'https://script.google.com/macros/s/AKfycbyn0TioU0zScUNKcx4ru5ugmReV_LW4SESWYGkDcxdUh7hoFIzWb7jLm9wlRc8tIjx97A/exec';

    // 2. All sports now use Chiefs Red/Black theme
    const sports = [
        { id: 'jh_vb', name: 'JH Volleyball', color: '#a51515' },
        { id: 'hs_vb', name: 'HS Volleyball', color: '#000000' },
        { id: 'jh_fb', name: 'JH Football', color: '#a51515' },
        { id: 'hs_fb', name: 'HS Football', color: '#000000' },
        { id: 'jh_bk', name: 'JH Basketball', color: '#a51515' },
        { id: 'hs_bk', name: 'HS Basketball', color: '#000000' },
        { id: 'jh_tr', name: 'JH Track', color: '#a51515' },
        { id: 'hs_tr', name: 'HS Track', color: '#000000' },
        { id: 'sb', name: 'Softball', color: '#a51515' },
        { id: 'bb', name: 'Baseball', color: '#000000' }
    ];

    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        const filterEl = document.getElementById('filters');

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,listMonth'
            }
        });

        sports.forEach(sport => {
            const div = document.createElement('div');
            div.className = 'filter-item';
            div.innerHTML = `<input type="checkbox" id="${sport.id}" checked> <label for="${sport.id}">${sport.name}</label>`;
            filterEl.appendChild(div);

            const sourceUrl = `${PROXY_URL}?sport=${encodeURIComponent(sport.name)}`;

            calendar.addEventSource({
                id: sport.id,
                url: sourceUrl,
                backgroundColor: sport.color,
                borderColor: sport.color
            });

            div.querySelector('input').addEventListener('change', function() {
                if (this.checked) {
                    calendar.addEventSource({ id: sport.id, url: sourceUrl, backgroundColor: sport.color, borderColor: sport.color });
                } else {
                    const source = calendar.getEventSourceById(sport.id);
                    if (source) source.remove();
                }
            });
        });

        calendar.render();
    });
</script>

</body>
</html>
